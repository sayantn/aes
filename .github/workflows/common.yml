name: common

on:
  push:
    branches:
      - master

jobs:
  style:
    name: Check Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          profile: minimal
          override: true

      - name: Rustfmt check
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all --check

  test-x86:
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: x86_64-unknown-linux-gnu
            caps: X86_64_UNKNOWN_LINUX_GNU
    uses: ./.github/workflows/x86.yml
    with:
      target: ${{ matrix.target.triple }}
      target-in-caps: ${{ matrix.target.caps }}

  test-arm:
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: aarch64-unknown-linux-gnu
            caps: AARCH64_UNKNOWN_LINUX_GNU
    uses: ./.github/workflows/arm.yml
    with:
      target: ${{ matrix.target.triple }}
      target-in-caps: ${{ matrix.target.caps }}

  test-riscv:
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: riscv64gc-unknown-linux-gnu
            caps: RISCV64GC_UNKNOWN_LINUX_GNU
    uses: ./.github/workflows/riscv.yml
    with:
      target: ${{ matrix.target.triple }}
      target-in-caps: ${{ matrix.target.caps }}

  test-other:
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: powerpc64-unknown-linux-gnu
            caps: POWERPC64_UNKNOWN_LINUX_GNU
    uses: ./.github/workflows/other.yml
    with:
      target: ${{ matrix.target.triple }}
      target-in-caps: ${{ matrix.target.caps }}